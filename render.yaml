services:
  - type: web
    name: orbital-lite-backend
    runtime: docker
    rootDir: orbital-backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: h2
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: http://localhost:3000,http://127.0.0.1:3000,https://*

  - type: web
    name: orbital-lite-frontend
    runtime: static
    rootDir: orbital-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://orbital-lite-backend.onrender.com/api
