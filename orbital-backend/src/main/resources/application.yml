server:
  port: ${PORT:8080}

debug: false

spring:
  application:
    name: orbital-lite
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  jpa:
    open-in-view: false

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,https://*}

logging:
  level:
    root: INFO
    com.orbital.lite: INFO
    org.hibernate.SQL: INFO
    org.springframework: INFO
