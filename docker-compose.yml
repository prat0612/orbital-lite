services:
  postgres:
    image: postgres:16
    container_name: orbital-postgres
    environment:
      POSTGRES_DB: orbital_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - orbital_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orbital_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./orbital-backend
    container_name: orbital-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orbital_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  orbital_postgres_data:
